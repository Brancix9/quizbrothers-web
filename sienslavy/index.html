<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sieň slávy - QuizBrothers</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../favicon.webp" type="image/webp">
    <style>
        /* Špecifické štýly pre pódium, ktoré v style.css nemáš */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .podium-place {
            background: white;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            flex: 1;
            min-width: 200px;
            min-height: 400px;
            position: relative;
            transition: all 0.3s ease;
            border-top: 4px solid #ddd;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        
        .place-1 { 
            order: 2; 
            border-top-color: #d4af37;
            transform: scale(1.08);
            z-index: 2;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            align-self: flex-start;
        }
        
        .place-1 h3 {
            color: #222454;
            font-weight: 600;
        }
        
        .place-2 { 
            order: 1; 
            border-top-color: #8a8a8a;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
            align-self: flex-end;
        }
        
        .place-2 h3 {
            color: #222454;
            font-weight: 600;
        }
        
        .place-3 { 
            order: 3; 
            border-top-color: #b87333;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
            align-self: flex-end;
        }
        
        .place-3 h3 {
            color: #222454;
            font-weight: 600;
        }
        
        .podium-place:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.15);
        }
        
        .place-1:hover {
            transform: translateY(-3px) scale(1.08);
        }
        
        .podium-place img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 5px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .podium-place img:hover { transform: scale(1.05); }
        .medal { 
            font-size: 2.5rem; 
            display: block; 
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        /* Tabuľka celkového poradia */
        .standings-table {
            width: 100%;
            max-width: 700px;
            margin: 40px auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .standings-table th {
            background: #222454;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        .standings-table th:first-child {
            width: 60px;
            text-align: center;
        }
        .standings-table th:last-child {
            width: 100px;
            text-align: right;
        }
        .standings-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        .standings-table td:first-child {
            text-align: center;
            font-weight: 600;
            color: #666;
        }
        .standings-table td:last-child {
            text-align: right;
            font-weight: 600;
            color: #27ae60;
        }
        .standings-table tr:hover {
            background: #f8f9fa;
        }
        .standings-table tr:last-child td {
            border-bottom: none;
        }
        .standings-table tr.top-3 {
            background: #f9f9f9;
        }
        .standings-table tr.top-3 td:first-child {
            font-size: 1.1em;
        }
        .standings-table tr:nth-child(2) td:first-child { color: #d4af37; }
        .standings-table tr:nth-child(3) td:first-child { color: #8a8a8a; }
        .standings-table tr:nth-child(4) td:first-child { color: #b87333; }
        
        /* Admin tlačidlá pre tabuľku */
        .standings-admin-controls {
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .standings-admin-controls.show {
            display: block;
        }
        .standings-admin-controls button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
        }
        .standings-admin-controls button:hover {
            background: #229954;
        }
        .standings-table tbody tr.admin-mode {
            position: relative;
        }
        .standings-table tbody tr.admin-mode td {
            cursor: text;
        }
        .standings-table tbody tr.admin-mode .row-delete {
            position: absolute;
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
            background: #e74c3c;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: none;
        }
        .standings-table tbody tr.admin-mode:hover .row-delete {
            display: block;
        }
        .standings-table tbody tr.admin-mode .row-delete:hover {
            background: #c0392b;
        }
        .standings-table-wrapper {
            position: relative;
        }
        
        /* Carousel galéria pre momentky */
        .gallery-carousel {
            position: relative;
            margin-top: 20px;
            overflow: hidden;
        }
        .gallery-track {
            display: flex;
            gap: 10px;
            transition: transform 0.3s ease;
        }
        .gallery-track img {
            flex: 0 0 calc(33.333% - 7px);
            height: 200px;
            object-fit: contain;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery-track img:hover { transform: scale(1.05); }
        
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.9);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .carousel-btn:hover { background: #fff; }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        
        .gallery-counter {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        
        @media (max-width: 768px) {
            .gallery-track img {
                flex: 0 0 100%;
                height: 250px;
            }
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }
        .gallery-grid img {
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 5px;
        }
        .gallery-grid img:hover { transform: scale(1.05); }

        /* Modal pre zväčšenie obrázkov */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close:hover { color: #ccc; }
        
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.8);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            color: #222454;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }
        .modal-nav:hover { background: rgba(255,255,255,1); }
        .modal-nav.modal-prev { left: 20px; }
        .modal-nav.modal-next { right: 20px; }
        
        /* Admin tlačidlá pre tabuľku */
        .standings-admin-controls {
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        .standings-admin-controls.show {
            display: block;
        }
        .standings-admin-controls button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
        }
        .standings-admin-controls button:hover {
            background: #229954;
        }
        .standings-table tbody tr.admin-mode {
            position: relative;
        }
        .standings-table tbody tr.admin-mode td[contenteditable] {
            cursor: text;
            background: #fffde7;
        }
        .standings-table tbody tr.admin-mode .row-delete {
            position: absolute;
            right: -35px;
            top: 50%;
            transform: translateY(-50%);
            background: #e74c3c;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: none;
        }
        .standings-table tbody tr.admin-mode:hover .row-delete {
            display: block;
        }
        .standings-table tbody tr.admin-mode .row-delete:hover {
            background: #c0392b;
        }
        .standings-table-wrapper {
            position: relative;
        }
        
        /* Admin tlačidlá pre pridanie sezóny */
        .add-season-btn {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .add-season-btn.show {
            display: block;
        }
        .add-season-btn button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            transition: all 0.3s ease;
        }
        .add-season-btn button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .delete-season-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .delete-season-btn:hover {
            background: #c0392b;
            transform: scale(1.05);
        }

        .season-card {
            margin-bottom: 60px;
        }

        .collapsible-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .collapsible-header:hover {
            background: #e9ecef;
        }

        .collapsible-header .toggle-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .collapsible-header.collapsed .toggle-icon {
            transform: rotate(-90deg);
        }

        .collapsible-content {
            max-height: 2000px;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .collapsible-content.collapsed {
            max-height: 0;
        }

        @media (max-width: 768px) {
            .podium-place {
                min-width: 100px;
                padding: 15px 10px;
            }
            .podium-place img {
                height: 180px;
            }
            .medal {
                font-size: 1.8rem;
            }
            .podium-place h3 {
                font-size: 0.9rem;
            }
            .podium-place p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="../" class="logo">
                <img src="../logo.png" alt="QuizBrothers Logo">
                <span>Quiz<span>Brothers</span></span>
            </a>
            <div class="menu-toggle" onclick="document.getElementById('nav-list').classList.toggle('show')">☰</div>
            <nav>
                <ul id="nav-list">
                    <li><a href="../">Domov</a></li>
                    <li><a href="../rezervacia/">Rezervácia stola</a></li>
                    <li><a href="../aplikacia/">Aplikácia</a></li>
                    <li><a href="/dennaotazka/">Denná otázka</a></li>
                    <li><a href="../sienslavy/" class="active">Sieň slávy</a></li>
                    <li><a href="../onas/">O nás</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 style="text-align: center;" id="hall_of_fame_title">🏆 Sieň slávy</h1>
        <p style="text-align: center; margin-bottom: 40px;" id="hall_of_fame_subtitle">Prehľad víťazov a najlepších momentov z našich sezón.</p>

        <!-- Admin tlačidlo pre pridanie sezóny hore -->
        <div class="add-season-btn" id="addSeasonTop">
            <button onclick="addNewSeason('up')">➕ Pridať novšiu sezónu</button>
        </div>

        <!-- Kontajner pre dynamické sezóny -->
        <div id="seasonsContainer">
            <!-- Sezóny sa generujú dynamicky -->
        </div>

        <!-- Admin tlačidlo pre pridanie sezóny dole -->
        <div class="add-season-btn" id="addSeasonBottom">
            <button onclick="addNewSeason('down')">➕ Pridať staršiu sezónu</button>
        </div>

    </div>

    <script>
        // ========== SEASONS MANAGEMENT ==========
        
        // Vytvorenie HTML pre jednu sezónu
        function createSeasonHTML(year) {
            return `
                <div class="card season-card" data-year="${year}" style="text-align: left;">
                    <h2 style="border-bottom: 2px solid #27ae60; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <span>Sezóna ${year}</span>
                        <button class="delete-season-btn" id="deleteSeason_${year}" onclick="deleteSeason('${year}')" style="display: none;">🗑️ Odstrániť sezónu</button>
                    </h2>
                    
                    <div class="podium-container">
                        <div class="podium-place place-2">
                            <span class="medal">🥈</span>
                            <img src="${year}/2miesto.webp" alt="2. miesto" onclick="openModal(this.src)" onerror="this.style.display='none'">
                            <h3 contenteditable="false" class="editable-text">2. miesto</h3>
                            <p style="font-weight: bold; margin-top: 5px; font-size: 18px;" contenteditable="false" class="editable-text" id="team2_${year}"></p>
                        </div>
                        <div class="podium-place place-1">
                            <span class="medal">👑</span>
                            <img src="${year}/1miesto.webp" alt="1. miesto" onclick="openModal(this.src)" onerror="this.style.display='none'">
                            <h3 contenteditable="false" class="editable-text">1. miesto</h3>
                            <p style="font-weight: bold; margin-top: 5px; font-size: 18px;" contenteditable="false" class="editable-text" id="team1_${year}"></p>
                        </div>
                        <div class="podium-place place-3">
                            <span class="medal">🥉</span>
                            <img src="${year}/3miesto.webp" alt="3. miesto" onclick="openModal(this.src)" onerror="this.style.display='none'">
                            <h3 contenteditable="false" class="editable-text">3. miesto</h3>
                            <p style="font-weight: bold; margin-top: 5px; font-size: 18px;" contenteditable="false" class="editable-text" id="team3_${year}"></p>
                        </div>
                    </div>

                    <h4 class="collapsible-header collapsed" onclick="toggleCollapse('standings_${year}')">
                        <span class="toggle-icon">▼</span>
                        🏆 Celkové poradie sezóny ${year}
                    </h4>
                    <div class="collapsible-content collapsed" id="standings_${year}">
                        <div class="standings-table-wrapper">
                            <table class="standings-table" id="standingsTable_${year}">
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Názov tímu</th>
                                        <th>Body</th>
                                    </tr>
                                </thead>
                                <tbody id="standingsTableBody_${year}">
                                    <tr><td colspan="3" style="text-align: center; padding: 20px; color: #999;">Žiadne dáta</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="standings-admin-controls" id="standingsAdminControls_${year}">
                            <button onclick="addStandingsRow('${year}')">➕ Pridať tím</button>
                            <button onclick="saveStandings('${year}')">💾 Uložiť zmeny</button>
                        </div>
                    </div>

                    <h4 class="collapsible-header collapsed" onclick="toggleCollapse('gallery_${year}')">
                        <span class="toggle-icon">▼</span>
                        📸 Momentky zo sezóny
                    </h4>
                    <div class="collapsible-content collapsed" id="gallery_${year}">
                        <div class="gallery-carousel">
                            <button class="carousel-btn prev" onclick="moveCarousel('${year}', -1)">‹</button>
                            <button class="carousel-btn next" onclick="moveCarousel('${year}', 1)">›</button>
                            <div class="gallery-track" id="galleryTrack_${year}">
                                ${generateGalleryImages(year)}
                            </div>
                        </div>
                        <div class="gallery-counter" id="galleryCounter_${year}"></div>
                    </div>
                </div>
            `;
        }

        // Generovanie obrázkov galérie
        function generateGalleryImages(year) {
            let html = '';
            for (let i = 1; i <= 17; i++) {
                html += `<img src="${year}/foto${i}.webp" alt="Foto ${i}" onclick="openModal(this.src)" onerror="this.style.display='none'"> `;
            }
            return html;
        }

        // Vykresli všetky sezóny
        window.renderSeasons = function() {
            const container = document.getElementById('seasonsContainer');
            if (!container) {
                console.error('❌ seasonsContainer neexistuje');
                return;
            }
            console.log('📝 Renderujem sezóny:', window.currentSeasons);
            
            // Zoraď sezóny - najprv číselné, potom textové
            window.currentSeasons.sort((a, b) => {
                const aNum = typeof a === 'number' ? a : parseInt(a.split('-')[0]);
                const bNum = typeof b === 'number' ? b : parseInt(b.split('-')[0]);
                return bNum - aNum; // Zostupne
            });
            
            container.innerHTML = window.currentSeasons.map(year => createSeasonHTML(year)).join('');
            
            // Vykresli tabuľky pre každú sezónu
            window.currentSeasons.forEach(year => {
                // Špeciálne spracovanie pre COVID sezónu 2020-2021
                if (year === "2020-2021") {
                    const standingsDiv = document.getElementById(`standings_${year}`);
                    console.log('🦠 Nastavujem COVID dizajn pre 2020-2021', standingsDiv);
                    if (standingsDiv) {
                        // Najprv rozbal sekciu
                        standingsDiv.classList.remove('collapsed');
                        const header = standingsDiv.previousElementSibling;
                        if (header && header.classList.contains('collapsible-header')) {
                            header.classList.remove('collapsed');
                        }
                        
                        // Nastav COVID dizajn
                        standingsDiv.innerHTML = `
                            <div style="text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; color: white;">
                                <h3 style="font-size: 28px; margin-bottom: 15px;">🦠 COVID-19 Pandémia</h3>
                                <p style="font-size: 18px; line-height: 1.6; max-width: 600px; margin: 0 auto;">
                                    Kvízová sezóna 2020/2021 bola prerušená kvôli pandémii koronavírusu.<br>
                                    Z bezpečnostných dôvodov sme museli všetky podujatia zrušiť.
                                </p>
                                <p style="margin-top: 20px; font-size: 16px; opacity: 0.9;">
                                    ⏸️ Sezóna prerušená • Žiadne výsledky
                                </p>
                            </div>
                        `;
                    } else {
                        console.error('❌ Element standings_2020-2021 sa nenašiel');
                    }
                    
                    // Odstráň mená víťazov pre COVID sezónu
                    const team1 = document.getElementById(`team1_${year}`);
                    const team2 = document.getElementById(`team2_${year}`);
                    const team3 = document.getElementById(`team3_${year}`);
                    if (team1) team1.textContent = '—';
                    if (team2) team2.textContent = '—';
                    if (team3) team3.textContent = '—';
                    return;
                }
                
                // Vykresli tabuľku ak máme dáta
                if (window.standingsData[year]) {
                    console.log(`📊 Vykresľujem tabuľku pre rok ${year} s ${window.standingsData[year].length} tímami`);
                    window.renderStandingsTable(year, window.standingsData[year], false);
                    
                    // Ak máme dáta, naplň víťazov do pódia
                    if (window.standingsData[year].length >= 3) {
                        const team1 = document.getElementById(`team1_${year}`);
                        const team2 = document.getElementById(`team2_${year}`);
                        const team3 = document.getElementById(`team3_${year}`);
                        
                        if (team1) team1.textContent = window.standingsData[year][0]?.name || '';
                        if (team2) team2.textContent = window.standingsData[year][1]?.name || '';
                        if (team3) team3.textContent = window.standingsData[year][2]?.name || '';
                    }
                } else {
                    console.log(`⚠️ Žiadne dáta pre rok ${year}`);
                }
            });
        }

        // Pridanie novej sezóny
        window.addNewSeason = async function(direction) {
            const maxYear = Math.max(...window.currentSeasons);
            const minYear = Math.min(...window.currentSeasons);
            const newYear = direction === 'up' ? maxYear + 1 : minYear - 1;
            
            if (!window.currentSeasons.includes(newYear)) {
                window.currentSeasons.push(newYear);
                
                // Inicializuj prázdne pole pre novú sezónu
                if (!window.standingsData[newYear]) {
                    window.standingsData[newYear] = [];
                }
                
                window.renderSeasons();
                
                // Ulož do Firebase
                try {
                    const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
                    await setDoc(doc(window.db, "web_content", "hall_of_fame"), {
                        seasons: window.currentSeasons
                    }, { merge: true });
                    console.log('✅ Sezóna', newYear, 'pridaná');
                    
                    // Ak je admin režim aktívny, zobraz admin tlačidlá pre všetky sezóny
                    if (document.body.classList.contains('admin-mode')) {
                        setTimeout(() => {
                            window.currentSeasons.forEach(year => {
                                const adminControls = document.getElementById(`standingsAdminControls_${year}`);
                                if (adminControls) {

        const carouselState = {};

        window.moveCarousel = function(year, direction) {
            if (!carouselState[year]) {
                carouselState[year] = { currentIndex: 0 };
            }
            
            const track = document.getElementById(`galleryTrack_${year}`);
            if (!track) return;
            
            const images = Array.from(track.querySelectorAll('img')).filter(img => img.style.display !== 'none');
            const totalImages = images.length;
            
            if (totalImages === 0) return;
            
            const imagesPerView = window.innerWidth <= 768 ? 1 : 3;
            const maxIndex = Math.max(0, totalImages - imagesPerView);
            
            carouselState[year].currentIndex += direction;
            if (carouselState[year].currentIndex < 0) carouselState[year].currentIndex = 0;
            if (carouselState[year].currentIndex > maxIndex) carouselState[year].currentIndex = maxIndex;
            
            const offset = -(carouselState[year].currentIndex * (100 / imagesPerView));
            track.style.transform = `translateX(${offset}%)`;
            
            const counter = document.getElementById(`galleryCounter_${year}`);
            if (counter) {
                const start = carouselState[year].currentIndex + 1;
                const end = Math.min(carouselState[year].currentIndex + imagesPerView, totalImages);
                counter.textContent = `${start}-${end} z ${totalImages}`;
            }

            if (modalImages.length === 0) return;

                        setDoc(doc(db, "web_content", "hall_of_fame"), {
                            standings_2025: defaultStandings,
                            seasons: window.currentSeasons
                        }, { merge: true });
                    }
                }
                
                // Po načítaní dát z Firebase vykresli sezóny
                setTimeout(() => {
                    if (typeof window.renderSeasons === 'function') {
                        console.log('🚀 Volám renderSeasons() s dátami:', window.standingsData);
                        window.renderSeasons();
                    } else {
                        console.error('❌ renderSeasons() funkcia neexistuje');
                    }
                }, 200);
            });
        }

        loadWebContent();
    </script>
